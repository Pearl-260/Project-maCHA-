<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Chama Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <style>
      .settings-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .settings-section {
        border: 1px solid var(--card);
        border-radius: 8px;
        padding: 20px;
        background: white;
        box-shadow: var(--shadow);
      }
      .settings-section h3 {
        color: var(--primary);
        margin-top: 0;
        font-size: 1.1rem;
        margin-bottom: 16px;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 10px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--text);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        font-size: 0.95rem;
        font-family: inherit;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.1);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
      }
      .checkbox-item input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
        cursor: pointer;
      }
      .checkbox-item label {
        margin: 0;
        cursor: pointer;
        font-weight: 400;
      }
      .button-group {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      @media (max-width: 900px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="brand-block">
          <h2>ChamaHub</h2>
          <p>Management System</p>
        </div>

        <nav class="sidebar-nav">
          <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
          <a href="{{ url_for('main.members') }}">Members</a>
          <a href="{{ url_for('main.groups') }}">Groups</a>
          <a href="{{ url_for('main.contributions') }}">Contributions</a>
          <a href="{{ url_for('main.payouts') }}">Payments</a>
          <a href="{{ url_for('main.reports') }}">Reports</a>
          <a href="{{ url_for('main.notifications') }}">Notifications</a>
          <a href="{{ url_for('main.settings') }}" class="active">Settings</a>
          <a href="{{ url_for('main.logout') }}">Logout</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Settings</h1>
            <p>Manage your account and system preferences</p>
          </div>
        </header>

        <div class="settings-grid" style="max-width: 900px; margin: 0 auto;">
          <section class="settings-section">
            <h3>Profile Information</h3>
            <form>
              <div class="form-row">
                <div class="form-group">
                  <label for="full_name">Full Name</label>
                  <input id="full_name" name="full_name" type="text" placeholder="Your full name" value="John Mwangi" />
                </div>
                <div class="form-group">
                  <label for="email">Email Address</label>
                  <input id="email" name="email" type="email" placeholder="your.email@example.com" value="john.mwangi@example.com" />
                </div>
              </div>
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input id="phone" name="phone" type="tel" placeholder="+254 700 000000" value="+254 700 123456" />
              </div>
            </form>
          </section>

          <section class="settings-section">
            <h3>Change Password</h3>
            <form>
              <div class="form-group">
                <label for="current_password">Current Password</label>
                <input id="current_password" name="current_password" type="password" placeholder="Enter your current password" />
              </div>
              <div class="form-group">
                <label for="new_password">New Password</label>
                <input id="new_password" name="new_password" type="password" placeholder="Enter your new password" />
              </div>
              <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirm your new password" />
              </div>
            </form>
          </section>

          <section class="settings-section">
            <h3>System Preferences</h3>
            <form>
              <div class="form-group">
                <label for="theme">Theme</label>
                <select id="theme" name="theme">
                  <option value="light">Light Mode</option>
                  <option value="dark">Dark Mode</option>
                  <option value="auto">Auto (System Default)</option>
                </select>
              </div>
              <div class="form-group">
                <label for="items_per_page">Items Per Page</label>
                <select id="items_per_page" name="items_per_page">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </div>
              <div class="form-group">
                <label for="date_format">Date Format</label>
                <select id="date_format" name="date_format">
                  <option value="dd/mm/yyyy" selected>DD/MM/YYYY</option>
                  <option value="mm/dd/yyyy">MM/DD/YYYY</option>
                  <option value="yyyy-mm-dd">YYYY-MM-DD</option>
                </select>
              </div>
            </form>
          </section>

          <section class="settings-section">
            <h3>Notification Preferences</h3>
            <form>
              <div class="checkbox-group">
                <div class="checkbox-item">
                  <input id="email_notif" name="email_notif" type="checkbox" checked />
                  <label for="email_notif">Receive Email Notifications</label>
                </div>
                <div class="checkbox-item">
                  <input id="sms_notif" name="sms_notif" type="checkbox" checked />
                  <label for="sms_notif">Receive SMS Notifications</label>
                </div>
                <div class="checkbox-item">
                  <input id="contribution_reminders" name="contribution_reminders" type="checkbox" checked />
                  <label for="contribution_reminders">Contribution Payment Reminders</label>
                </div>
                <div class="checkbox-item">
                  <input id="group_updates" name="group_updates" type="checkbox" checked />
                  <label for="group_updates">Group Updates and Announcements</label>
                </div>
                <div class="checkbox-item">
                  <input id="payout_alerts" name="payout_alerts" type="checkbox" checked />
                  <label for="payout_alerts">Payout Alerts</label>
                </div>
                <div class="checkbox-item">
                  <input id="meeting_reminders" name="meeting_reminders" type="checkbox" checked />
                  <label for="meeting_reminders">Meeting Reminders</label>
                </div>
              </div>
            </form>
          </section>

          <div class="button-group">
            <a href="{{ url_for('main.dashboard') }}" class="action-btn" style="display: inline-block; padding: 10px 16px; border-radius: 8px; text-decoration: none;">Cancel</a>
            <button type="submit" class="add-btn" onclick="alert('Settings saved successfully!')">Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
