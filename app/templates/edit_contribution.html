<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Contribution | Chama Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
  </head>
  <body>
    <main class="main-content" style="max-width: 720px; margin: 40px auto;">
      <section class="panel">
        <h2>Edit Contribution</h2>
        <p class="muted">Update the selected contribution record.</p>

        <form method="POST" action="{{ url_for('main.edit_contribution', contribution_id=contribution.id) }}">
          <label for="member">Member</label>
          <select id="member" name="member" required>
            <option value="">Select a member</option>
            {% for member in members %}
            <option value="{{ member.full_name }}" {% if member.full_name == contribution.member_name %}selected{% endif %}>{{ member.full_name }}</option>
            {% endfor %}
          </select>

          <label for="group">Group</label>
          <select id="group" name="group" required>
            <option value="">Select a group</option>
            {% for group in groups %}
            <option value="{{ group.group_name }}" {% if group.group_name == contribution.group_name %}selected{% endif %}>{{ group.group_name }}</option>
            {% endfor %}
          </select>

          <label for="amount">Contribution Amount</label>
          <input id="amount" name="amount" type="number" min="0" step="0.01" value="{{ contribution.amount }}" required />

          <label for="payment_date">Payment Date</label>
          <input id="payment_date" name="payment_date" type="date" value="{{ contribution.payment_date }}" required />

          <label for="payment_status">Payment Status</label>
          <select id="payment_status" name="payment_status" required>
            <option value="Completed" {% if contribution.payment_status == 'Completed' %}selected{% endif %}>Completed</option>
            <option value="Pending" {% if contribution.payment_status == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Failed" {% if contribution.payment_status == 'Failed' %}selected{% endif %}>Failed</option>
          </select>

          <div style="margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end;">
            <button type="submit" class="add-btn">Update</button>
            <a href="{{ url_for('main.contributions') }}" class="action-btn" style="display: inline-block; padding: 10px 12px; border-radius: 8px; text-decoration: none;">Cancel</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
